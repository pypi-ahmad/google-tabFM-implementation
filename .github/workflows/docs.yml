name: Docs (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages_probe.outputs.pages_enabled }}
    env:
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --extra docs --frozen

      - name: Build site
        run: uv run mkdocs build

      - name: Upload built site artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-site
          path: site

      - name: Probe whether GitHub Pages is enabled for this repo
        id: pages_probe
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          code="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "$api")"
          if [ "$code" = "200" ]; then
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
            echo "[pages] enabled: deploying via GitHub Actions"
          else
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
            echo "[pages] not enabled (HTTP $code): skipping deploy. Enable in Settings -> Pages."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: false
        if: steps.pages_probe.outputs.pages_enabled == 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
        if: steps.pages_probe.outputs.pages_enabled == 'true'

  deploy:
    needs: build
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
