name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --extra dev --frozen

      - name: Run repository hygiene checks
        run: ./scripts/validate_repo_hygiene.sh

      - name: Run test suite
        run: uv run pytest

      - name: Validate benchmark CLI contract
        run: uv run python scripts/run_benchmark.py --help

      - name: Validate strict E2E CLI contract
        run: uv run python scripts/run_strict_e2e.py --help

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
            gh release upload "${GITHUB_REF_NAME}" HANDBOOK.pdf --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md \
              HANDBOOK.pdf
          fi
