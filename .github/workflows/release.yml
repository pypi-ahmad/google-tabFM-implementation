name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --extra dev --frozen

      - name: Run repository hygiene checks
        run: ./scripts/validate_repo_hygiene.sh

      - name: Run test suite
        run: uv run pytest

      - name: Validate benchmark CLI contract
        run: uv run python scripts/run_benchmark.py --help

      - name: Validate strict E2E CLI contract
        run: uv run python scripts/run_strict_e2e.py --help

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            HANDBOOK.pdf
