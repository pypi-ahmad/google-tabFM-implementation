site_name: Google TabFM — Zero to Mastery
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Learning Path:
      - "00 — Overview": 00-overview.md
      - "01 — Prerequisites": 01-prerequisites.md
      - "02 — Installation": 02-installation.md
      - "03 — First Run": 03-first-run.md
      - "04 — Core Concepts": 04-core-concepts.md
      - "05 — Working with Data": 05-working-with-data.md
      - "06 — Usage Workflows": 06-training-or-usage-workflows.md
      - "07 — Evaluation": 07-evaluation.md
      - "08 — Troubleshooting": 08-troubleshooting.md
      - "09 — FAQ": 09-faq.md
      - "10 — Next Steps": 10-next-steps.md
      - "11 — Datasets & Licenses": 11-datasets-and-licenses.md
